<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الخدمات التجارية | HUSSEIN OS</title>
    <style>
        :root {
            --matrix-green: #00ff41;
            --card-bg: rgba(18, 18, 18, 0.95);
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* خلفية الماتريكس المتحركة */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.6;
        }

        /* الشريط العلوي (الإحصائيات) */
        .top-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--matrix-green);
            margin: 10px;
            padding: 10px;
            border-radius: 15px;
            font-family: monospace;
            color: var(--matrix-green);
            text-align: center;
        }

        .header-section {
            text-align: center;
            padding: 20px;
        }

        .main-title {
            color: var(--matrix-green);
            font-size: 2.5rem;
            text-shadow: 0 0 15px var(--matrix-green);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* تصميم البطاقات (الخدمات) */
        .services-container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        .service-card {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .service-card h2 {
            margin-top: 0;
            font-size: 1.5rem;
        }

        .service-card p {
            color: #ccc;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .price {
            color: var(--matrix-green);
            font-size: 1.8rem;
            font-weight: bold;
            margin: 15px 0;
        }

        .order-btn {
            background: var(--matrix-green);
            color: #000;
            border: none;
            padding: 12px 40px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .order-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="top-bar">
        <div>
            <div style="font-size: 0.8rem;">VISITORS: <span id="v-time">00:00:00</span></div>
            <div style="font-size: 1.2rem; font-weight: bold;">1,405</div>
        </div>
        <div>
            <div style="font-size: 0.8rem;">SERVER:</div>
            <div style="font-size: 1rem; font-weight: bold;">ONLINE</div>
        </div>
    </div>

    <div class="header-section">
        <h1 class="main-title">الخدمات التجارية 🛡️</h1>
    </div>

    <div class="services-container">
        <div class="service-card">
            <h2>فحص الثغرات الأمنية</h2>
            <p>كشف نقاط الضعف في المواقع والتطبيقات.</p>
            <div class="price">25,000 د.ع</div>
            <button class="order-btn" onclick="location.href='https://t.me/Yssine111'">طلب الخدمة</button>
        </div>

        <div class="service-card">
            <h2>برمجة أدوات Python</h2>
            <p>بناء سكربتات ذكية لأتمتة المهام التقنية.</p>
            <div class="price">مخصص</div>
            <button class="order-btn" onclick="location.href='https://t.me/Yssine111'">طلب الخدمة</button>
        </div>
    </div>

    <script>
        // ساعة الزوار
        setInterval(() => {
            document.getElementById('v-time').innerText = new Date().toLocaleTimeString('en-GB');
        }, 1000);

        // خلفية الماتريكس
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "0101010101010101";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 33);
    </script>
</body>
</html>
