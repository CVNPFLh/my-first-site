<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حسين للمعلوماتية | خدمات الأمن السيبراني والبرمجة</title>
    <meta name="description" content="الموقع الرسمي للمبرمج حسين - متخصص في الأمن السيبراني، برمجة أدوات Python، ودعم أنظمة Linux في العراق.">
    <meta name="keywords" content="حسين, مبرمج عراقي, أمن سيبراني, بايثون, تيرمكس, فحص ثغرات, Hussein Tech, Python Iraq">
    <meta name="author" content="حسين">

    <style>
        :root {
            --primary-green: #00ff41;
            --dark-bg: #000000;
            --card-bg: rgba(10, 10, 10, 0.9);
        }

        body {
            background-color: var(--dark-bg);
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #matrix-canvas {
            position: fixed;
            top: 0; left: 0; z-index: -1;
        }

        .system-status {
            display: flex; justify-content: space-between;
            width: 90%; max-width: 1100px;
            margin-top: 15px; font-family: monospace;
            color: var(--primary-green); font-size: 0.9rem;
            background: rgba(0,0,0,0.6); padding: 10px;
            border-radius: 8px; border: 1px solid rgba(0, 255, 65, 0.3);
            z-index: 2;
        }

        .section-title {
            color: var(--primary-green);
            margin: 40px 0 20px;
            text-shadow: 0 0 10px var(--primary-green);
            font-size: 2rem;
            text-align: center;
        }

        .services-grid, .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px; width: 95%; max-width: 1100px; z-index: 1;
            margin-bottom: 30px;
        }

        .service-card, .portfolio-item {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 20px; border-radius: 15px;
            border: 1px solid #1a1a1a; transition: 0.4s;
            text-align: center;
        }

        .service-card:hover, .portfolio-item:hover {
            transform: translateY(-10px);
            border-color: var(--primary-green);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
        }

        .portfolio-item img {
            width: 100%; height: 200px; object-fit: cover;
            border-radius: 10px; margin-bottom: 10px;
            border: 1px solid #333;
        }

        .price { font-size: 1.4rem; color: var(--primary-green); margin: 15px 0; font-weight: bold; }
        
        .btn-buy {
            background: var(--primary-green); color: black;
            text-decoration: none; padding: 12px;
            border-radius: 8px; font-weight: bold; display: block;
            transition: 0.3s;
        }

        .btn-buy:hover { filter: brightness(1.2); transform: scale(1.02); }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="system-status">
        <div>SERVER: ONLINE</div>
        <div id="digital-clock">00:00:00</div>
        <div>VISITORS: <span id="visitor-count">1,402</span></div>
    </div>

    <h2 class="section-title">🛡️ الخدمات التجارية</h2>
    <div class="services-grid">
        <div class="service-card">
            <h3>فحص الثغرات الأمنية</h3>
            <p>كشف نقاط الضعف في المواقع والتطبيقات.</p>
            <div class="price">25,000 د.ع</div>
            <a href="https://t.me/Yssine111?text=مرحباً حسين، أود طلب خدمة فحص الثغرات" class="btn-buy">طلب الخدمة</a>
        </div>
        <div class="service-card">
            <h3>برمجة أدوات Python</h3>
            <p>بناء سكريبتات ذكية لأتمتة المهام التقنية.</p>
            <div class="price">15,000 د.ع</div>
            <a href="https://t.me/Yssine111?text=مرحباً حسين، أود طلب برمجة سكريبت خاص" class="btn-buy">طلب الخدمة</a>
        </div>
    </div>

    <h2 class="section-title">🎨 معرض المشاريع</h2>
    <div class="portfolio-grid">
        <div class="portfolio-item">
            <img src="https://telegra.ph/file/0c6c64673663a8a38a7c2.jpg" alt="Eren Yeager Artwork">
            <p>فن رقمي: إيرين ييغر</p>
        </div>
        <div class="portfolio-item">
            <img src="https://telegra.ph/file/69c1181f9b3b246a4e320.jpg" alt="Cyber Security Concept">
            <p>مفهوم الاختراق الأخلاقي</p>
        </div>
    </div>

    <script>
        // الساعة الرقمية
        function updateClock() {
            const now = new Date();
            document.getElementById('digital-clock').textContent = now.toLocaleTimeString('en-GB');
        }
        setInterval(updateClock, 1000);
        updateClock();

        // عداد الزوار
        let count = 1402;
        setInterval(() => {
            count += Math.floor(Math.random() * 2);
            document.getElementById('visitor-count').textContent = count.toLocaleString();
        }, 8000);

        // خلفية الماتريكس (0/1)
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const letters = "01"; const fontSize = 16;
        const columns = canvas.width / fontSize; const drops = [];
        for (let i = 0; i < columns; i++) drops[i] = 1;
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0"; ctx.font = fontSize + "px arial";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 33);
    </script>
</body>
</html>
