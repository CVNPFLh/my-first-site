<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدمات وأدوات حسين التقنية</title>
    <style>
        :root {
            --matrix-green: #00ff41;
            --card-bg: rgba(15, 15, 15, 0.95);
            --accent-blue: #00d2ff;
        }

        body {
            background-color: #000; color: #fff;
            font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.5; }

        /* الهيدر العلوي */
        .top-bar {
            display: flex; justify-content: space-around; background: rgba(0,0,0,0.8);
            border: 1px solid var(--matrix-green); margin: 10px; padding: 10px;
            border-radius: 12px; font-family: monospace; color: var(--matrix-green);
        }

        .section-title {
            text-align: center; color: var(--matrix-green);
            text-shadow: 0 0 10px var(--matrix-green); margin: 30px 0 15px 0;
        }

        .container { padding: 15px; max-width: 500px; margin: 0 auto; }

        /* تصميم البطاقات الموحد */
        .card {
            background: var(--card-bg); border: 1px solid #222;
            border-radius: 15px; padding: 20px; margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .price { color: var(--matrix-green); font-size: 1.5rem; font-weight: bold; margin: 10px 0; }
        
        input {
            width: 100%; background: #000; border: 1px solid #444;
            color: var(--matrix-green); padding: 10px; border-radius: 8px;
            box-sizing: border-box; margin-top: 10px; font-family: monospace;
        }

        .btn {
            background: var(--matrix-green); color: #000; border: none;
            padding: 12px; width: 100%; border-radius: 8px;
            font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        .tool-res {
            font-size: 0.8rem; color: var(--accent-blue);
            margin-top: 10px; direction: ltr; text-align: left;
            word-break: break-all; min-height: 20px;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="top-bar">
        <div>VISITORS: <span id="v-time">00:00:00</span><br><b>1,405</b></div>
        <div style="text-align:center;">SERVER:<br><b>ONLINE</b></div>
    </div>

    <div class="container">
        <h2 class="section-title">الخدمات التجارية 🛡️</h2>
        <div class="card">
            <h3>فحص الثغرات الأمنية</h3>
            <p style="color:#aaa; font-size:0.9rem;">كشف نقاط الضعف في المواقع والتطبيقات.</p>
            <div class="price">25,000 د.ع</div>
            <button class="btn" onclick="location.href='https://t.me/Yssine111'">طلب الخدمة</button>
        </div>

        <h2 class="section-title">أدوات ذكية 🛠️</h2>
        
        <div class="card">
            <h4 style="margin:0;">محول النصوص (Binary)</h4>
            <input type="text" id="bin-input" placeholder="اكتب هنا للتحويل..." 
                   oninput="document.getElementById('bin-out').innerText = this.value.split('').map(c => c.charCodeAt(0).toString(2)).join(' ')">
            <div id="bin-out" class="tool-res"></div>
        </div>

        <div class="card">
            <h4 style="margin:0;">توليد كلمة سر قوية</h4>
            <button class="btn" style="background: #333; color: #fff;" onclick="genPass()">توليد الآن</button>
            <div id="pass-out" class="tool-res" style="text-align:center; font-size:1.1rem; color:var(--matrix-green);"></div>
        </div>
    </div>

    <script>
        // ساعة النظام
        setInterval(() => {
            document.getElementById('v-time').innerText = new Date().toLocaleTimeString('en-GB');
        }, 1000);

        // وظيفة توليد كلمة السر
        function genPass() {
            const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
            let pass = "";
            for (let i = 0; i < 12; i++) pass += chars.charAt(Math.floor(Math.random() * chars.length));
            document.getElementById('pass-out').innerText = pass;
        }

        // خلفية الماتريكس (الكلاسيكية)
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width/16)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#0F0"; ctx.font = "15px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*2), i*16, y*16);
                if(y*16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 33);
    </script>
</body>
</html>
