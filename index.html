<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUSSEIN ULTIMATE SYSTEM | v23</title>
    <style>
        :root { --matrix: #00ff41; --hud-blue: #00d2ff; --bg-dark: rgba(10, 10, 10, 0.96); }
        body {
            margin: 0; background: #000; color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: url('https://i.ibb.co/XzC83yY/hacker-mask-poster.jpg') center/cover no-repeat fixed;
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 0; }
        .content { position: relative; z-index: 1; padding: 15px; max-width: 480px; margin: 0 auto; }

        /* شريط الإحصائيات */
        .top-stats {
            display: flex; justify-content: space-around; align-items: center;
            background: rgba(0,0,0,0.95); border: 1px solid var(--matrix);
            border-radius: 15px; padding: 12px; margin-bottom: 20px;
            font-family: monospace; color: var(--matrix); text-align: center;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.3);
        }

        .card {
            background: var(--bg-dark); border: 1px solid #333;
            border-radius: 20px; padding: 20px; margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
        }
        h3 { color: var(--matrix); margin-top: 0; text-shadow: 0 0 8px var(--matrix); font-size: 1.1rem; }
        
        textarea, input {
            width: 100%; background: #050505; border: 1px solid #444;
            color: var(--matrix); padding: 12px; border-radius: 10px;
            margin-top: 10px; box-sizing: border-box; font-family: monospace;
        }

        .btn {
            background: var(--matrix); color: #000; border: none;
            padding: 14px; width: 100%; border-radius: 12px;
            font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        /* سجل العمليات المتحرك */
        #log-box {
            background: #000; border: 1px solid #222; border-radius: 10px;
            padding: 10px; font-family: monospace; font-size: 0.75rem;
            color: #888; height: 80px; overflow: hidden; line-height: 1.5;
        }

        /* معلومات النظام للزائر */
        .sys-info { font-size: 0.8rem; color: var(--hud-blue); font-family: monospace; margin-top: 5px; }

        /* HUD DNA */
        .dna-vibe { position: fixed; left: 10px; top: 20%; display: flex; flex-direction: column; gap: 4px; opacity: 0.4; }
        .dna-bar { width: 15px; height: 3px; background: var(--hud-blue); animation: vibrate 0.6s infinite alternate; }
        @keyframes vibrate { from { transform: scaleX(1); } to { transform: scaleX(2.5); } }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="dna-vibe" id="dna"></div>

    <div class="content">
        <div class="top-stats">
            <div>VISITORS:<br><span id="clock">00:00:00</span><br><b>1,405</b></div>
            <div style="font-size: 1.8rem;">🛡️</div>
            <div>SERVER:<br><b style="color:var(--matrix)">ONLINE</b></div>
        </div>

        <div class="card">
            <h3>سجل العمليات النشط ⚡</h3>
            <div id="log-box"></div>
        </div>

        <div class="card" style="text-align: center;">
            <h3>بيانات الوصول الآمن 🔍</h3>
            <div class="sys-info" id="user-info">جاري فحص مواصفات الجهاز...</div>
        </div>

        <div class="card" style="text-align: center;">
            <h3>الترجمة الفورية 🌐</h3>
            <div id="google_translate_element"></div>
        </div>

        <div class="card" style="text-align: center;">
            <h3>فحص الثغرات الأمنية</h3>
            <div style="color:var(--matrix); font-size:1.8rem; font-weight:bold; margin: 10px 0;">25,000 د.ع</div>
            <button class="btn" onclick="location.href='https://t.me/Yssine111'">طلب الخدمة الآن</button>
        </div>

        <div class="card">
            <h3>أداة التشفير 🔐</h3>
            <textarea id="crypt-in" rows="2" placeholder="أدخل النص هنا..."></textarea>
            <div style="display:flex; gap:10px;">
                <button class="btn" onclick="doCrypt('en')">تشفير</button>
                <button class="btn" style="background:#222; color:#fff; border:1px solid var(--matrix);" onclick="doCrypt('de')">فك التشفير</button>
            </div>
            <div id="crypt-out" style="margin-top:10px; font-size:0.8rem; color:var(--hud-blue); word-break:break-all;"></div>
        </div>
    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ar'}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        // ساعة النظام
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);

        // سجل العمليات
        const logBox = document.getElementById('log-box');
        const msgs = ["> Initializing security...", "> [OK] Firewall active.", "> Checking for breaches...", "> Encrypting data...", "> [INFO] System stable."];
        let idx = 0;
        setInterval(() => {
            logBox.innerHTML += msgs[idx % msgs.length] + "<br>";
            logBox.scrollTop = logBox.scrollHeight;
            idx++;
            if(logBox.childNodes.length > 8) logBox.removeChild(logBox.firstChild);
        }, 2500);

        // معلومات النظام
        document.getElementById('user-info').innerHTML = `OS: ${navigator.platform}<br>Browser: ${navigator.appName}<br>Screen: ${screen.width}x${screen.height}`;

        // التشفير
        function doCrypt(m) {
            const i = document.getElementById('crypt-in').value;
            const o = document.getElementById('crypt-out');
            try {
                o.innerText = (m === 'en') ? btoa(unescape(encodeURIComponent(i))) : decodeURIComponent(escape(atob(i)));
            } catch(e) { o.innerText = "خطأ في النص!"; }
        }

        // بناء HUD DNA
        const dna = document.getElementById('dna');
        for(let i=0; i<15; i++) {
            let b = document.createElement('div'); b.className = 'dna-bar';
            b.style.animationDelay = (i*0.1)+'s'; dna.appendChild(b);
        }
    </script>
</body>
</html>
