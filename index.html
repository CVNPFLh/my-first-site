<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة حسين التقنية | Classic Matrix v16</title>
    <style>
        :root {
            --primary-green: #00ff41;
            --dark-bg: #010101;
            --panel-bg: rgba(0, 0, 0, 0.95);
        }

        body {
            background-color: var(--dark-bg); color: var(--primary-green);
            font-family: monospace; margin: 0; overflow-x: hidden;
        }

        #matrix-canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.5; }

        .status-bar {
            background: #000; border-bottom: 1px solid var(--primary-green);
            padding: 8px; display: flex; justify-content: space-between;
            font-size: 0.7rem; color: var(--primary-green); position: sticky; top: 0; z-index: 1000;
            direction: ltr;
        }

        /* القائمة الجانبية الكلاسيكية */
        .side-nav {
            position: fixed; left: 10px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 15px; z-index: 1001;
        }

        .nav-icon {
            background: #000; border: 1px solid var(--primary-green);
            color: var(--primary-green); width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 0 10px rgba(0,255,65,0.3); font-size: 1.2rem;
        }

        /* النوافذ الجانبية */
        .side-panel {
            position: fixed; top: 0; bottom: 0; left: -100%; width: 85%; max-width: 320px;
            background: var(--panel-bg); border-right: 2px solid var(--primary-green);
            z-index: 1002; transition: 0.4s ease-in-out; padding: 25px; 
            box-shadow: 10px 0 30px rgba(0,0,0,1); overflow-y: auto;
        }

        .side-panel.active { left: 0; }
        .close-btn { color: #ff4141; float: left; cursor: pointer; border: 1px solid #ff4141; padding: 2px 8px; border-radius: 5px; }

        /* ستايلات الأدوات */
        .terminal-box { 
            background: rgba(0,0,0,0.8); border: 1px solid var(--primary-green); 
            padding: 15px; min-height: 100px; text-align: left; direction: ltr; 
            color: var(--primary-green); font-size: 0.85rem; margin: 20px 0;
            box-shadow: inset 0 0 10px rgba(0,255,65,0.1);
        }

        .tool-card { border: 1px solid #333; padding: 12px; border-radius: 5px; margin-top: 15px; text-align: right; }
        input { width: 100%; background: #000; border: 1px solid var(--primary-green); color: var(--primary-green); padding: 8px; margin-top: 5px; }
        .btn { width: 100%; background: var(--primary-green); color: black; border: none; padding: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        .glitch-title { font-size: 2rem; font-weight: bold; text-shadow: 0 0 10px var(--primary-green); margin-top: 50px; }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="status-bar">
        <span>HUSSEIN_CORE_V16</span>
        <span id="top-clock">00:00:00</span>
        <span>LATENCY: 12ms</span>
    </div>

    <div class="side-nav">
        <div class="nav-icon" onclick="openPanel('p-tools')">🛠️</div>
        <div class="nav-icon" onclick="openPanel('p-clock')">🕒</div>
        <a href="https://t.me/Yssine111" class="nav-icon" style="text-decoration:none;">💬</a>
    </div>

    <div id="p-tools" class="side-panel">
        <span class="close-btn" onclick="closeAll()">X إغلاق</span>
        <h3 style="margin-top:40px;">الأدوات السيبرانية</h3>
        
        <div class="tool-card">
            <p>ماسح المنافذ:</p>
            <button class="btn" onclick="runScanner()">ابدأ الفحص</button>
            <div id="scan-res" style="font-size:0.7rem; margin-top:5px; text-align:left; direction:ltr;">Ready...</div>
        </div>

        <div class="tool-card">
            <p>محول ثنائي:</p>
            <input type="text" oninput="document.getElementById('b-res').innerText = this.value.split('').map(c => c.charCodeAt(0).toString(2)).join(' ')">
            <div id="b-res" style="font-size:0.6rem; color:cyan; margin-top:5px; word-break:break-all;"></div>
        </div>
    </div>

    <div id="p-clock" class="side-panel">
        <span class="close-btn" onclick="closeAll()">X إغلاق</span>
        <h3 style="margin-top:40px;">التوقيت المحلي</h3>
        <div id="big-clock" style="font-size:2rem; text-align:center; border:1px solid var(--primary-green); padding:20px;">00:00:00</div>
    </div>

    <div style="text-align:center; padding:20px;">
        <div class="glitch-title">بوابة حسين التقنية</div>
        <div style="font-size:4rem;">⌨️</div>
        <div class="terminal-box" id="term"></div>
        <a href="https://t.me/Yssine111" class="btn" style="text-decoration:none; display:inline-block; width:auto; padding:10px 30px;">تليجرام</a>
    </div>

    <script>
        function openPanel(id) { closeAll(); document.getElementById(id).classList.add('active'); }
        function closeAll() { document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('active')); }

        // محاكاة الفحص
        function runScanner() {
            let out = document.getElementById('scan-res');
            out.innerHTML = "Scanning...";
            let p = [22, 80, 443, 8080]; let i = 0;
            let int = setInterval(() => {
                if(i < p.length) { out.innerHTML += `<br>> Port ${p[i]}: OPEN`; i++; }
                else { out.innerHTML += "<br>> Complete."; clearInterval(int); }
            }, 600);
        }

        // الساعة
        setInterval(() => {
            let d = new Date();
            let t = d.toLocaleTimeString('en-GB');
            document.getElementById('top-clock').innerText = t;
            if(document.getElementById('big-clock')) document.getElementById('big-clock').innerText = t;
        }, 1000);

        // التيرمينال
        let lines = ["> System Rebooted...", "> Classic Interface Loaded.", "> Matrix Active.", "> Welcome Back Hussein."], l = 0;
        function type() {
            if(l < lines.length) { document.getElementById('term').innerHTML += lines[l] + "<br>"; l++; setTimeout(type, 800); }
        }
        type();

        // الماتريكس (خلفية)
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width/16)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#0F0"; ctx.font = "16px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*2), i*16, y*16);
                if(y*16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 33);
    </script>
</body>
</html>
