<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة حسين التقنية | HUSSEIN OS v13</title>
    <style>
        :root { --green: #00ff41; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: monospace; margin: 0; overflow: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.3; }
        
        .status-bar { border-bottom: 1px solid var(--green); padding: 8px; display: flex; justify-content: space-between; font-size: 11px; color: var(--green); background: #000; }
        
        .side-nav { position: fixed; left: 10px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 100; }
        .icon { width: 42px; height: 42px; border: 1px solid var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #000; cursor: pointer; color: var(--green); box-shadow: 0 0 10px rgba(0,255,65,0.2); }

        .panel { position: fixed; top: 0; left: -100%; width: 290px; height: 100%; background: rgba(5,5,5,0.98); border-right: 1px solid var(--green); transition: 0.4s; z-index: 101; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .panel.active { left: 0; }
        .close { color: #ff4141; cursor: pointer; border: 1px solid #ff4141; padding: 2px 8px; border-radius: 4px; float: left; font-size: 12px; }

        .container { text-align: center; padding: 30px 15px; height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .terminal { background: #050505; border: 1px solid #222; padding: 12px; text-align: left; direction: ltr; color: var(--green); font-size: 12px; min-height: 90px; border-radius: 8px; margin: 15px 0; overflow: hidden; }
        .card { border: 1px solid #333; padding: 12px; border-radius: 8px; background: rgba(10,10,10,0.9); margin-top: 10px; }
        .cmd-box { background: #111; color: #00d2ff; padding: 5px; font-size: 11px; border: 1px dashed #444; margin-top: 5px; cursor: pointer; }
        .btn { background: var(--green); color: #000; border: none; padding: 10px; width: 100%; font-weight: bold; margin-top: 10px; border-radius: 5px; cursor: pointer; text-decoration: none; display: block; font-size: 14px; }
    </style>
</head>
<body>

    <canvas id="m"></canvas>

    <div class="status-bar">
        <span>[ HUSSEIN_OS_ACTIVE ]</span>
        <span id="clk">00:00:00</span>
    </div>

    <div class="side-nav">
        <div class="icon" onclick="openP('p1')">⚙️</div>
        <div class="icon" onclick="openP('p2')">🕒</div>
        <div class="icon" onclick="location.href='https://t.me/Yssine111'">💬</div>
    </div>

    <div id="p1" class="panel">
        <span class="close" onclick="closeP()">X إغلاق</span>
        <h3 style="color:var(--green); margin-top:45px; text-align:right;">🛠️ أوامر تيرمكس</h3>
        
        <div class="card">
            <p style="font-size:12px; margin:0; text-align:right;">تحديث النظام:</p>
            <div class="cmd-box" onclick="copy(this)">pkg update && pkg upgrade</div>
        </div>

        <div class="card">
            <p style="font-size:12px; margin:0; text-align:right;">تثبيت بايثون:</p>
            <div class="cmd-box" onclick="copy(this)">pkg install python</div>
        </div>

        <div class="card" style="margin-top:20px;">
            <p style="font-size:12px; text-align:right;">توليد كود عشوائي:</p>
            <button class="btn" onclick="document.getElementById('gen-out').innerText = Math.random().toString(36).toUpperCase().substring(2,10)">توليد</button>
            <div id="gen-out" style="text-align:center; color:yellow; margin-top:10px; font-weight:bold;"></div>
        </div>
    </div>

    <div id="p2" class="panel">
        <span class="close" onclick="closeP()">X إغلاق</span>
        <h3 style="color:var(--green); margin-top:45px; text-align:right;">🕒 توقيت الخادم</h3>
        <div id="big-clk" style="font-size:26px; color:var(--green); text-align:center; padding:25px; border:1px double var(--green); background:#000;">00:00:00</div>
        <p style="color:#666; font-size:11px; text-align:center; margin-top:10px;">Syncing with Global Nodes...</p>
    </div>

    <div class="container">
        <h1 style="text-shadow: 0 0 15px var(--green); margin:0; font-size: 28px;">HUSSEIN OS</h1>
        <div style="font-size:60px; margin: 10px 0;">💻</div>
        <div class="terminal" id="term"></div>
        <div class="card">
            <p style="font-size:13px;">مطور برمجيات وأمن سيبراني</p>
            <a href="https://t.me/Yssine111" class="btn">قناة التليجرام</a>
        </div>
    </div>

    <script>
        function openP(id) { closeP(); document.getElementById(id).classList.add('active'); }
        function closeP() { document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); }
        function copy(el) { alert("تم نسخ الأمر: " + el.innerText); }

        // الساعة
        setInterval(() => {
            let d = new Date();
            let t = d.toLocaleTimeString('en-GB');
            document.getElementById('clk').innerText = t;
            if(document.getElementById('big-clk')) document.getElementById('big-clk').innerText = t + ":" + Math.floor(d.getMilliseconds()/10);
        }, 50);

        // التيرمكس
        let lines = ["> Booting Kernel...", "> Network: Secure", "> User: Hussein", "> System Ready."], i = 0;
        function type() {
            if(i < lines.length) {
                document.getElementById('term').innerHTML += lines[i] + "<br>";
                i++; setTimeout(type, 900);
            }
        }
        type();

        // الماتريكس
        const c = document.getElementById('m');
        const ctx = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        const drops = Array(Math.floor(c.width/16)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.08)"; ctx.fillRect(0,0,c.width,c.height);
            ctx.fillStyle = "#0F0"; ctx.font = "15px monospace";
            drops.forEach((y, x) => {
                ctx.fillText(Math.floor(Math.random()*2), x*16, y*16);
                if(y*16 > c.height && Math.random() > 0.98) drops[x] = 0;
                drops[x]++;
            });
        }
        setInterval(draw, 35);
    </script>
</body>
</html>
