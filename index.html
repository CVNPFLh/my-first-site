<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة حسين التقنية | HUSSEIN OS v10</title>
    <style>
        :root {
            --primary-green: #00ff41;
            --dark-bg: #010101;
            --panel-bg: rgba(5, 5, 5, 0.98);
        }

        body {
            background-color: var(--dark-bg); color: #e0e0e0;
            font-family: monospace; margin: 0; overflow-x: hidden;
        }

        #matrix-canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.3; }

        .status-bar {
            background: #000; border-bottom: 1px solid var(--primary-green);
            padding: 8px; display: flex; justify-content: space-between;
            font-size: 0.7rem; color: var(--primary-green); position: sticky; top: 0; z-index: 1000;
            direction: ltr;
        }

        /* القائمة الجانبية */
        .side-nav {
            position: fixed; left: 10px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 15px; z-index: 1001;
        }

        .nav-icon {
            background: #000; border: 1px solid var(--primary-green);
            color: var(--primary-green); width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 0 10px rgba(0,255,65,0.2); font-size: 1.2rem;
        }

        /* النوافذ الجانبية */
        .side-panel {
            position: fixed; top: 0; bottom: 0; left: -100%; width: 85%; max-width: 320px;
            background: var(--panel-bg); border-right: 2px solid var(--primary-green);
            z-index: 1002; transition: 0.4s ease-in-out; padding: 25px; 
            box-shadow: 10px 0 30px rgba(0,0,0,0.9);
        }

        .side-panel.active { left: 0; }

        .close-btn { color: #ff4141; float: left; cursor: pointer; border: 1px solid #ff4141; padding: 2px 8px; border-radius: 5px; }

        /* ستايل ساعة الهكر */
        .hacker-clock {
            font-size: 1.5rem; color: var(--primary-green);
            text-shadow: 0 0 10px var(--primary-green);
            background: #000; padding: 10px; border-radius: 5px;
            border: 1px solid #333; display: inline-block; direction: ltr;
            margin-top: 20px;
        }

        .container { padding: 20px; text-align: center; }
        .glitch-title { font-size: 2rem; color: white; text-shadow: 0 0 15px var(--primary-green); margin: 20px 0; font-weight: bold; }
        
        .terminal-box {
            background: #000; border: 1px solid #222; border-radius: 10px;
            padding: 15px; height: 110px; text-align: left; direction: ltr;
            color: var(--primary-green); font-size: 0.8rem; overflow: hidden; margin: 15px 0;
        }

        .card { background: rgba(20,20,20,0.8); border: 1px solid #333; padding: 15px; border-radius: 10px; margin-top: 20px; text-align: right; border-right: 3px solid var(--primary-green); }
        
        textarea, input { width: 100%; background: #000; border: 1px solid var(--primary-green); color: var(--primary-green); padding: 10px; border-radius: 5px; box-sizing: border-box; font-family: monospace; }
        .btn-run { width: 100%; background: var(--primary-green); color: black; border: none; padding: 10px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="status-bar">
        <span>SECURITY_OS: v10.0</span>
        <span id="top-clock">00:00:00</span>
        <span>LATENCY: 12ms</span>
    </div>

    <div class="side-nav">
        <div class="nav-icon" onclick="openPanel('p-enc')">🔐</div>
        <div class="nav-icon" onclick="openPanel('p-clock')">🕒</div>
        <div class="nav-icon" onclick="openPanel('p-info')">📊</div>
        <div class="nav-icon" onclick="window.location.href='https://t.me/Yssine111'">💬</div>
    </div>

    <div id="p-clock" class="side-panel">
        <span class="close-btn" onclick="closeAll()">إغلاق X</span>
        <h3 style="color: var(--primary-green); text-align: right; margin-top: 40px;">🕒 توقيت النظام العالمي</h3>
        <div style="text-align: center;">
            <div id="big-clock" class="hacker-clock">00:00:00:00</div>
            <p style="font-size: 0.8rem; color: #888; margin-top: 10px;">نظام المزامنة: متصل (إقليمي)</p>
        </div>
        <div class="card">
            <p style="font-size: 0.75rem; text-align: right; margin: 0;">تاريخ اليوم:<br><span id="sys-date" style="color: cyan;">--</span></p>
        </div>
    </div>

    <div id="p-enc" class="side-panel">
        <span class="close-btn" onclick="closeAll()">X</span>
        <h3 style="color: var(--primary-green); text-align: right; margin-top: 30px;">🔐 التشفير الاحترافي</h3>
        <textarea id="inpText" rows="3" placeholder="أدخل النص هنا..."></textarea>
        <button class="btn-run" onclick="doEnc()">تشفير Base64</button>
        <div id="resText" style="margin-top:10px; color: cyan; font-size: 0.75rem; word-break: break-all;"></div>
    </div>

    <div id="p-info" class="side-panel">
        <span class="close-btn" onclick="closeAll()">X</span>
        <h3 style="color: var(--primary-green); text-align: right; margin-top: 30px;">📊 بيانات الخادم</h3>
        <div id="sys-data" style="text-align: right; font-size: 0.8rem; line-height: 2;"></div>
    </div>

    <div class="container">
        <div class="glitch-title">HUSSEIN HUB</div>
        <div style="font-size: 3.5rem; text-shadow: 0 0 20px var(--primary-green);">🛡️</div>
        <div class="terminal-box" id="term"></div>
        <div class="card">
            <h4 style="margin:0; color: var(--primary-green);">حسين للتقنية</h4>
            <p style="font-size: 0.85rem;">الموقع الرسمي للحلول البرمجية المتكاملة</p>
            <a href="https://t.me/Yssine111" style="background: var(--primary-green); color: black; padding: 8px 15px; text-decoration: none; font-weight: bold; border-radius: 5px; display: inline-block;">تواصل الآن</a>
        </div>
    </div>

    <script>
        function openPanel(id) { closeAll(); document.getElementById(id).classList.add('active'); }
        function closeAll() { document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('active')); }

        // نظام ساعة الهكر المتطور
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const ms = String(Math.floor(now.getMilliseconds() / 10)).padStart(2, '0');
            
            // تحديث الساعة في شريط الحالة
            document.getElementById('top-clock').innerText = `${h}:${m}:${s}`;
            
            // تحديث الساعة الكبيرة في النافذة الجانبية
            if(document.getElementById('big-clock')) {
                document.getElementById('big-clock').innerText = `${h}:${m}:${s}:${ms}`;
            }
        }
        setInterval(updateClock, 10); // تحديث كل 10 ملي ثانية للدقة

        // عرض التاريخ
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('sys-date').innerText = new Date().toLocaleDateString('ar-EG', options);

        function doEnc() {
            const val = document.getElementById('inpText').value;
            document.getElementById('resText').innerText = val ? btoa(val) : "";
        }

        const lines = ["> Booting System...", "> Matrix Synced.", "> Welcome Hussein.", "> Status: Online."];
        let l = 0;
        function type() {
            if(l < lines.length) {
                document.getElementById('term').innerHTML += lines[l] + "<br>";
                l++; setTimeout(type, 1000);
            }
        }
        type();

        document.getElementById('sys-data').innerHTML = `> الموقع: العراق<br>> المنصة: ${navigator.platform}<br>> المزامنة: Active`;

        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width/16)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#0F0"; ctx.font = "16px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*2), i*16, y*16);
                if(y*16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 33);
    </script>
</body>
</html>
