<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUSSEIN HUD INTERFACE</title>
    <style>
        body {
            margin: 0; background: #000; color: #00ff41;
            font-family: 'Courier New', monospace; overflow: hidden;
            background: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80') center/cover;
        }

        /* طبقة التعتيم لجعل العناصر تبرز */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); z-index: 0;
        }

        /* إطار النظام الرئيسي */
        .hud-container {
            position: relative; z-index: 1; height: 100vh;
            border: 2px solid rgba(0, 255, 65, 0.2); box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: space-between; padding: 20px;
        }

        /* الأقراص الدوارة (مثل التي في أعلى الصورة) */
        .radar {
            position: absolute; top: 20px; right: 20px;
            width: 100px; height: 100px; border: 2px solid var(--green);
            border-radius: 50%; border-style: dashed;
            animation: rotate 10s linear infinite;
        }

        /* نافذة البيانات المركزية */
        .data-window {
            border: 1px solid #00d2ff; background: rgba(0, 210, 255, 0.1);
            padding: 10px; width: 250px; position: absolute; top: 20%; left: 50%;
            transform: translateX(-50%); box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }

        /* الموجات الصوتية المتحركة (أسفل الصورة) */
        .waves-container {
            display: flex; align-items: flex-end; gap: 3px; height: 50px; justify-content: center;
        }
        .bar {
            width: 4px; background: #00d2ff;
            animation: wave 0.5s ease-in-out infinite alternate;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes wave { from { height: 10px; } to { height: 50px; } }

        .system-failure {
            color: #ff4141; font-weight: bold; text-align: center;
            animation: blink 0.8s infinite; margin-top: 10px;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="overlay"></div>
    
    <div class="hud-container">
        <div class="radar"></div>

        <div class="data-window">
            <div style="font-size: 10px; border-bottom: 1px solid #00d2ff; margin-bottom: 5px;">SERVER STATUS</div>
            <div id="ip-data">IP: 236.248.23.19</div>
            <div class="system-failure">SYSTEM FAILURE</div>
            <div style="font-size: 9px; margin-top: 10px;">100000110011...</div>
        </div>

        <div style="margin-bottom: 50px;">
            <div class="waves-container" id="waves"></div>
            <p style="text-align: center; font-size: 12px; letter-spacing: 5px;">ANALYZING VOICE PATTERN...</p>
        </div>
    </div>

    <script>
        // إنشاء أعمدة الموجات برمجياً
        const container = document.getElementById('waves');
        for (let i = 0; i < 30; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.animationDelay = `${Math.random() * 0.5}s`;
            container.appendChild(bar);
        }

        // تحديث أرقام عشوائية
        setInterval(() => {
            const data = document.querySelector('.data-window div:last-child');
            data.innerText = Math.random().toString(2).substr(2, 15);
        }, 100);
    </script>
</body>
</html>
