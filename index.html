<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUSSEIN CYBER HUB | Auto-Bot</title>
    <style>
        :root { --matrix: #00ff41; --hud-blue: #00d2ff; --bg-dark: rgba(10, 10, 10, 0.96); }
        body {
            margin: 0; background: #000; color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: url('https://i.ibb.co/XzC83yY/hacker-mask-poster.jpg') center/cover no-repeat fixed;
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 0; }
        .content { position: relative; z-index: 1; padding: 15px; max-width: 480px; margin: 0 auto; margin-bottom: 100px; }

        .card { background: var(--bg-dark); border: 1px solid #333; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.9); }
        h3 { color: var(--matrix); margin-top: 0; text-shadow: 0 0 8px var(--matrix); font-size: 1.1rem; }
        
        input { width: 100%; background: #050505; border: 1px solid #444; color: var(--matrix); padding: 12px; border-radius: 10px; margin-top: 10px; box-sizing: border-box; font-family: monospace; }
        .btn { background: var(--matrix); color: #000; border: none; padding: 14px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* تصميم نافذة المجيب الآلي */
        .chat-container {
            position: fixed; bottom: 20px; right: 20px; left: 20px; z-index: 100;
            max-width: 440px; margin: 0 auto;
        }
        .chat-box {
            background: #000; border: 1px solid var(--matrix); border-radius: 15px;
            overflow: hidden; display: none; flex-direction: column; height: 300px;
            box-shadow: 0 0 20px var(--matrix);
        }
        .chat-header { background: var(--matrix); color: #000; padding: 10px; font-weight: bold; text-align: center; cursor: pointer; }
        .messages { flex: 1; padding: 10px; overflow-y: auto; font-size: 0.85rem; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 80%; line-height: 1.4; }
        .msg.bot { background: #111; color: var(--matrix); align-self: flex-start; border: 1px solid #222; }
        .msg.user { background: var(--matrix); color: #000; align-self: flex-end; }
        .chat-input-area { display: flex; padding: 10px; gap: 5px; background: #050505; }
        .chat-input-area input { margin-top: 0; flex: 1; padding: 8px; }
        .send-btn { background: var(--matrix); border: none; border-radius: 5px; padding: 0 15px; cursor: pointer; font-weight: bold; }

        .chat-toggle {
            background: var(--matrix); color: #000; border-radius: 50px;
            padding: 12px 25px; cursor: pointer; font-weight: bold;
            display: inline-block; float: left; box-shadow: 0 0 15px var(--matrix);
        }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="content">
        <div class="card" style="text-align: center; border-color: var(--matrix);">
            <div style="font-family: monospace; color: var(--matrix);">
                SYSTEM STATUS: <b id="clock">00:00:00</b> | VISITORS: 1,405
            </div>
        </div>

        <div class="card">
            <h3>أدوات الفحص والتشفيير 🔐</h3>
            <p style="font-size: 0.8rem; color: #888;">استخدم الأدوات المدمجة لتأمين بياناتك.</p>
            <button class="btn" style="background: #222; color: #fff; border: 1px solid var(--matrix);" onclick="location.href='#chat'">افتح المجيب الآلي بالأسفل</button>
        </div>

        <div class="card" style="text-align: center;">
            <h3>الخدمات التجارية</h3>
            <div style="color:var(--matrix); font-size:1.8rem; font-weight:bold;">25,000 د.ع</div>
            <button class="btn" onclick="location.href='https://t.me/Yssine111'">تواصل مباشر (تليجرام)</button>
        </div>
    </div>

    <div class="chat-container">
        <div class="chat-toggle" id="toggle-btn" onclick="toggleChat()">💬 تحدث مع المجيب الآلي</div>
        
        <div class="chat-box" id="chat-window">
            <div class="chat-header" onclick="toggleChat()">نظام الرد الآلي - حسين</div>
            <div class="messages" id="chat-msgs">
                <div class="msg bot">مرحباً بك في نظام حسين التقني. كيف يمكنني مساعدتك؟</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="user-msg" placeholder="اكتب رسالتك هنا...">
                <button class="send-btn" onclick="sendMessage()">إرسال</button>
            </div>
        </div>
    </div>

    <script>
        // الساعة
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);

        // وظائف الدردشة
        function toggleChat() {
            const win = document.getElementById('chat-window');
            const btn = document.getElementById('toggle-btn');
            if(win.style.display === "none" || win.style.display === "") {
                win.style.display = "flex";
                btn.style.display = "none";
            } else {
                win.style.display = "none";
                btn.style.display = "block";
            }
        }

        function sendMessage() {
            const input = document.getElementById('user-msg');
            const msgs = document.getElementById('chat-msgs');
            if(!input.value.trim()) return;

            // رسالة المستخدم
            msgs.innerHTML += `<div class="msg user">${input.value}</div>`;
            const userText = input.value;
            input.value = "";
            msgs.scrollTop = msgs.scrollHeight;

            // رد المجيب الآلي بعد ثانية واحدة
            setTimeout(() => {
                msgs.innerHTML += `<div class="msg bot">أعتذر منك، حسين مشغول حالياً في برمجة أدوات جديدة. سأقوم بإبلاغه برسالتك وسيجيبك في أقرب وقت ممكن. 🛡️</div>`;
                msgs.scrollTop = msgs.scrollHeight;
            }, 1000);
        }
    </script>
</body>
</html>
