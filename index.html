<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة حسين التقنية</title>
    <style>
        /* تصميم مستوحى من واجهات الأمن السيبراني */
        body {
            background-color: #0d1117; /* لون داكن فخم */
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .profile-card {
            background: #161b22;
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #238636; /* إطار أخضر تقني */
            text-align: center;
            box-shadow: 0 0 20px rgba(35, 134, 54, 0.4);
            max-width: 380px;
            width: 85%;
            transition: 0.3s;
        }

        .profile-card:hover {
            box-shadow: 0 0 30px rgba(35, 134, 54, 0.6);
            transform: scale(1.02);
        }

        h1 {
            color: #2ea043; /* لون أخضر زاهي */
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #8b949e;
        }

        .status {
            background: #0d1117;
            padding: 12px;
            border-radius: 10px;
            font-family: 'Courier New', Courier, monospace;
            color: #7ee787;
            border: 1px solid #30363d;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <h1>حسين</h1>
        <p>طالب طموح في تقنية المعلومات 💻</p>
        <div class="status">
            > التخصص: الأمن السيبراني & Python
        </div>
        <br>
        <p>مرحباً بكم في موقعي الرسمي الأول على الإنترنت!</p>
    </div>

</body>
</html>
