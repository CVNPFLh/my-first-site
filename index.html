<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة حسين التقنية | Professional Profile</title>
    <style>
        :root {
            --primary-green: #2ea043;
            --dark-bg: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.8); /* خلفية البطاقة شفافة قليلاً */
            --text-gray: #8b949e;
        }

        body {
            /* إضافة خلفية تقنية فخمة */
            background-image: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .profile-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px); /* تأثير التغبيش الزجاجي */
            padding: 35px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            max-width: 400px;
            width: 85%;
            border-top: 4px solid var(--primary-green);
            transition: 0.3s;
        }

        .profile-card:hover {
            transform: translateY(-5px);
            border-top-color: #3fb950;
        }

        h1 {
            color: var(--primary-green);
            font-size: 2.6rem;
            margin-bottom: 5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .typing-container {
            font-family: 'Courier New', monospace;
            color: #7ee787;
            font-size: 1.1rem;
            margin-bottom: 15px;
            min-height: 1.2em;
            background: rgba(0,0,0,0.3);
            padding: 5px;
            border-radius: 5px;
        }

        .skills-container {
            margin: 20px 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .skill-tag {
            background: rgba(33, 38, 45, 0.7);
            border: 1px solid rgba(48, 54, 61, 0.8);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #58a6ff;
            font-weight: bold;
        }

        .social-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.3s;
            font-size: 0.9rem;
            flex: 1;
        }

        .btn-telegram { background: #0088cc; color: white; }
        .btn-python { background: #3776ab; color: white; }

        .btn:hover {
            filter: brightness(1.2);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <h1>حسين</h1>
        
        <div class="typing-container">
            <span id="typing"></span>
        </div>
        
        <p style="color: #f0f6fc;">طالب تقنية معلومات | باحث في الأمن السيبراني وتطوير أدوات بايثون.</p>

        <div class="skills-container">
            <span class="skill-tag">Termux</span>
            <span class="skill-tag">Linux</span>
            <span class="skill-tag">Python</span>
            <span class="skill-tag">SQLMap</span>
            <span class="skill-tag">Nmap</span>
        </div>

        <div class="social-buttons">
            <a href="https://t.me/YOUR_USERNAME" class="btn btn-telegram">تليجرام</a>
            <a href="#" class="btn btn-python">أدواتي</a>
        </div>
    </div>

    <script>
        const text = "Cybersecurity Student & Python Developer";
        let index = 0;
        function type() {
            if (index < text.length) {
                document.getElementById("typing").innerHTML += text.charAt(index);
                index++;
                setTimeout(type, 100);
            }
        }
        window.onload = type;
    </script>

</body>
</html>
