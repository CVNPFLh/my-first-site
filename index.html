<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUSSEIN ULTIMATE TOOLS</title>
    <style>
        :root { --matrix: #00ff41; --hud-blue: #00d2ff; }
        body {
            margin: 0; background: #000; color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: url('https://i.ibb.co/XzC83yY/hacker-mask-poster.jpg') center/cover no-repeat fixed;
        }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 0; }
        .main-content { position: relative; z-index: 1; padding: 20px; max-width: 480px; margin: 0 auto; }

        /* البطاقات */
        .card {
            background: rgba(15, 15, 15, 0.95); border: 1px solid #333;
            border-radius: 20px; padding: 20px; margin-top: 20px;
        }
        h3 { color: var(--matrix); margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        textarea, input {
            width: 100%; background: #000; border: 1px solid #444;
            color: var(--matrix); padding: 10px; border-radius: 10px;
            margin-top: 10px; box-sizing: border-box; font-family: monospace;
        }

        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn {
            flex: 1; background: var(--matrix); color: #000; border: none;
            padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer;
        }

        /* تنسيق أداة الترجمة */
        #google_translate_element { margin-top: 10px; text-align: center; }
        .goog-te-gadget-simple { background-color: #000 !important; border: 1px solid var(--matrix) !important; padding: 8px !important; border-radius: 10px !important; }
        .goog-te-gadget-simple span { color: var(--matrix) !important; }

        /* HUD DNA */
        .dna-side { position: fixed; left: 10px; top: 20%; display: flex; flex-direction: column; gap: 4px; opacity: 0.5; }
        .dna-bar { width: 15px; height: 3px; background: var(--hud-blue); animation: pulse 0.7s infinite alternate; }
        @keyframes pulse { from { transform: scaleX(1); } to { transform: scaleX(2.5); } }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="dna-side" id="dna"></div>

    <div class="main-content">
        <div class="card">
            <h3>الترجمة الفورية 🌐</h3>
            <div id="google_translate_element"></div>
        </div>

        <div class="card">
            <h3>أداة التشفير الذكية 🔐</h3>
            <textarea id="crypto-input" rows="3" placeholder="أدخل النص هنا..."></textarea>
            <div class="btn-group">
                <button class="btn" onclick="processCrypto('encode')">تشفير</button>
                <button class="btn" style="background:#222; color:#fff; border:1px solid var(--matrix);" onclick="processCrypto('decode')">فك التشفير</button>
            </div>
            <div id="crypto-output" style="margin-top:15px; font-size:0.8rem; color:var(--hud-blue); word-break:break-all; background:#000; padding:10px; border-radius:8px; direction:ltr; min-height:30px;">
                النتيجة ستظهر هنا...
            </div>
        </div>

        <div class="card" style="text-align:center;">
            <h3>الخدمات التجارية</h3>
            <p style="font-size:0.9rem; color:#ccc;">فحص الثغرات الأمنية وتأمين المواقع.</p>
            <div style="color:var(--matrix); font-size:1.5rem; font-weight:bold; margin-bottom:15px;">25,000 د.ع</div>
            <button class="btn" onclick="location.href='https://t.me/Yssine111'">طلب الخدمة</button>
        </div>
    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'ar', layout: google.translate.TranslateElement.InlineLayout.SIMPLE}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        // وظيفة التشفير وفك التشفير
        function processCrypto(type) {
            const input = document.getElementById('crypto-input').value;
            const output = document.getElementById('crypto-output');
            if(!input) return;

            try {
                if(type === 'encode') {
                    output.innerText = btoa(unescape(encodeURIComponent(input)));
                } else {
                    output.innerText = decodeURIComponent(escape(atob(input)));
                }
            } catch(e) {
                output.innerText = "خطأ: تأكد من صحة النص المدخل!";
                output.style.color = "red";
            }
        }

        // إنشاء HUD DNA
        const dna = document.getElementById('dna');
        for(let i=0; i<15; i++) {
            let b = document.createElement('div'); b.className = 'dna-bar';
            b.style.animationDelay = (i*0.1)+'s'; dna.appendChild(b);
        }
    </script>
</body>
</html>
