<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة حسين التقنية | HUSSEIN OS PRO</title>
    
    <style>
        :root {
            --primary-green: #00ff41;
            --accent-blue: #00d2ff;
            --dark-bg: #010101;
            --panel-bg: rgba(5, 5, 5, 0.98);
        }

        body {
            background-color: var(--dark-bg); color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace; margin: 0; overflow-x: hidden;
        }

        #matrix-canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.3; }

        /* شريط الحالة العلوي المنسق للهاتف */
        .status-bar {
            background: #000; border-bottom: 1px solid var(--primary-green);
            padding: 8px 15px; display: flex; justify-content: space-between;
            font-size: 0.7rem; color: var(--primary-green); position: sticky; top: 0; z-index: 1000;
            direction: ltr;
        }

        /* القائمة الجانبية العائمة */
        .side-nav {
            position: fixed; left: 10px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 15px; z-index: 1001;
        }

        .nav-icon {
            background: rgba(0, 0, 0, 0.8); border: 1px solid var(--primary-green);
            color: var(--primary-green); width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: 0.3s; font-size: 1.2rem;
        }

        .nav-icon:hover { background: var(--primary-green); color: black; box-shadow: 0 0 15px var(--primary-green); }

        /* النوافذ الجانبية المتحركة */
        .side-panel {
            position: fixed; top: 45px; bottom: 0; left: -100%; width: 85%; max-width: 350px;
            background: var(--panel-bg); border-right: 2px solid var(--primary-green);
            z-index: 1002; transition: 0.5s; padding: 20px; box-shadow: 10px 0 30px rgba(0,0,0,0.9);
        }

        .side-panel.active { left: 0; }

        .close-btn { color: #ff4141; float: left; cursor: pointer; font-weight: bold; border: 1px solid #ff4141; padding: 2px 8px; border-radius: 5px; }

        /* المحتوى الرئيسي */
        .container { padding: 20px; text-align: center; }

        .glitch-title {
            font-size: 2.2rem; color: white; text-shadow: 0 0 15px var(--primary-green);
            margin: 20px 0; font-weight: bold;
        }

        .terminal-box {
            background: #000; border: 1px solid #222; border-radius: 10px;
            padding: 15px; margin: 20px auto; height: 100px; text-align: left;
            direction: ltr; color: var(--primary-green); font-size: 0.8rem; overflow: hidden;
        }

        .card {
            background: rgba(20,20,20,0.8); border: 1px solid #333; padding: 15px;
            border-radius: 10px; margin-top: 20px; border-right: 3px solid var(--primary-green);
        }

        textarea, input {
            width: 100%; background: #000; border: 1px solid var(--primary-green);
            color: var(--primary-green); padding: 10px; margin: 10px 0; border-radius: 5px;
        }

        .btn-run {
            width: 100%; background: var(--primary-green); color: black; border: none;
            padding: 10px; font-weight: bold; border-radius: 5px; cursor: pointer;
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="status-bar">
        <span>OS: HUSSEIN_V7</span>
        <span id="clock">00:00:00</span>
        <span>VISITORS: <span id="v-count">1,581</span></span>
    </div>

    <div class="side-nav">
        <div class="nav-icon" onclick="openPanel('p-enc')" title="تشفير">🔒</div>
        <div class="nav-icon" onclick="openPanel('p-info')" title="بيانات">📊</div>
        <div class="nav-icon" onclick="window.location.href='https://t.me/Yssine111'" title="تواصل">💬</div>
    </div>

    <div id="p-enc" class="side-panel">
        <span class="close-btn" onclick="closeAll()">إغلاق X</span>
        <h3 style="color: var(--primary-green); margin-top: 40px;">🔐 وحدة التشفير</h3>
        <textarea id="inpText" rows="5" placeholder="أدخل النص لتشفيره..."></textarea>
        <button class="btn-run" onclick="doEnc()">تشفير الآن</button>
        <div id="resText" style="margin-top:20px; color: var(--accent-blue); word-break: break-all; font-size: 0.8rem;"></div>
    </div>

    <div id="p-info" class="side-panel">
        <span class="close-btn" onclick="closeAll()">إغلاق X</span>
        <h3 style="color: var(--primary-green); margin-top: 40px;">📊 حالة النظام</h3>
        <div id="sys-data" style="text-align: right; font-size: 0.8rem; line-height: 2;"></div>
    </div>

    <div class="container">
        <div class="glitch-title">HUSSEIN TECH HUB</div>
        <img src="https://telegra.ph/file/69c1181f9b3b246a4e320.jpg" style="width: 100px; border-radius: 50%; border: 2px solid var(--primary-green);">
        
        <div class="terminal-box" id="term"></div>

        <div class="card">
            <h4 style="margin:0; color: var(--primary-green);">خدمات مخصصة</h4>
            <p style="font-size: 0.9rem;">برمجة سكريبتات Python | فحص أمني | دعم تيرمكس</p>
            <a href="https://t.me/Yssine111" style="color: white; text-decoration: none; font-weight: bold;">[ اطلب خدمتك الآن ]</a>
        </div>
    </div>

    <script>
        // فتح وإغلاق النوافذ
        function openPanel(id) {
            closeAll();
            document.getElementById(id).classList.add('active');
        }
        function closeAll() {
            document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('active'));
        }

        // أداة التشفير
        function doEnc() {
            const val = document.getElementById('inpText').value;
            document.getElementById('resText').innerText = "النتيجة المشفرة: " + btoa(val);
        }

        // محاكاة التيرمكس
        const lines = ["> Initializing OS...", "> Loading Matrix core...", "> Security: Active.", "> Welcome, Hussein."];
        let l = 0;
        function type() {
            if(l < lines.length) {
                document.getElementById('term').innerHTML += lines[l] + "<br>";
                l++; setTimeout(type, 1500);
            }
        }
        type();

        // بيانات النظام
        document.getElementById('sys-data').innerHTML = `
            - الموقع: العراق / الأنبار<br>
            - المعالج: Octa-core Virtual<br>
            - الاتصال: SSL Encrypted<br>
            - المتصفح: ${navigator.platform}
        `;

        // الماتريكس والساعة
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
        
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width/16)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#0F0"; ctx.font = "16px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*2), i*16, y*16);
                if(y*16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 33);
    </script>
</body>
</html>
